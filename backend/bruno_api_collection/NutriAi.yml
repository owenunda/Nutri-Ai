opencollection: 1.0.0
info:
  name: NutriAi
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: token
      variables:
        - name: TokenAccess
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjIsImVtYWlsIjoib3dlbnVuZGFAZ21haWwuY29tIiwicm9sZSI6IlVTRVIiLCJwbGFuIjoiRlJFRSIsImlhdCI6MTc3NzQxMzI1OCwiZXhwIjoxNzc3NDk5NjU4fQ.JVzJFduH_kRX9AgilKN-5uCNbKAdSqp199a-TCAqW38
items:
  - info:
      name: auth
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: login
          type: http
          seq: 2
        http:
          method: POST
          url: http://localhost:3000/api/v1/auth/login
          body:
            type: json
            data: |-
              {
                "email": "owenunda@gmail.com",
                "password": "012345"
              }
          auth: inherit
        runtime:
          scripts:
            - type: after-response
              code: |-
                const jsonData = res.getBody();

                // Verificar si existe la propiedad 'token' dentro de 'data'
                if (jsonData && jsonData.data && jsonData.data.token) {
                    // Establecer el valor como variable de entorno
                    bru.setEnvVar("TokenAccess", jsonData.data.token);
                    console.log("Token establecido correctamente");
                } else {
                    console.log("No se pudo encontrar el 'token' en la respuesta.");
                }
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: register
          type: http
          seq: 1
        http:
          method: POST
          url: http://localhost:3000/api/v1/auth/register
          body:
            type: json
            data: |-
              {
                "name": "Oween",
                "email": "owenunda@gmail.com",
                "password": "012345"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: recipe
      type: folder
      seq: 3
    request:
      auth: inherit
    items:
      - info:
          name: addIngredientsInRecipe
          type: http
          seq: 3
        http:
          method: POST
          url: http://localhost:3000/api/v1/recipe/:id/ingredients
          params:
            - name: id
              value: '2'
              type: path
          body:
            type: json
            data: |-
              [
                {"food_id": 1, "quantity": 1, "unit": "g"},
                {"food_id": 2, "quantity": 1, "unit": "g"},
                {"food_id": 3, "quantity": 1, "unit": "g"}
              ]
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: createRecipe
          type: http
          seq: 2
        http:
          method: POST
          url: http://localhost:3000/api/v1/recipe
          body:
            type: json
            data: |-
              {
                "name": "Recipe tests"
              }
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: getAllRecipe
          type: http
          seq: 1
        http:
          method: GET
          url: http://localhost:3000/api/v1/recipe
          body:
            type: json
            data: ''
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: food
      type: folder
      seq: 2
    request:
      auth: inherit
    items:
      - info:
          name: getAllFoods
          type: http
          seq: 1
        http:
          method: GET
          url: http://localhost:3000/api/v1/food
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: user
      type: folder
      seq: 4
    request:
      auth: inherit
    items:
      - info:
          name: getAllUser
          type: http
          seq: 1
        http:
          method: GET
          url: http://localhost:3000/api/v1/user
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-04-29T01:27:49.470Z'
    exportedUsing: Bruno
