  environments:
    - name: token
      variables:
        - name: TokenAccess
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjIsImVtYWlsIjoib3dlbnVuZGFAZ21haWwuY29tIiwicm9sZSI6IlVTRVIiLCJwbGFuIjoiRlJFRSIsImlhdCI6MTc3NzQxMzI1OCwiZXhwIjoxNzc3NDk5NjU4fQ.JVzJFduH_kRX9AgilKN-5uCNbKAdSqp199a-TCAqW38
items:
  - info:
      name: auth
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: login
          type: http
          seq: 2
        http:
          method: POST
          url: http://localhost:3000/api/v1/auth/login
          body:
            type: json
            data: |-
              {
                  "email": "juliana@test.com",
                  "password": "123456"
              }
          auth:
            type: bearer
            token: ''
        runtime:
          scripts:
            - type: after-response
              code: |-
                const jsonData = res.getBody();

                // Verificar si existe la propiedad 'token' dentro de 'data'
                if (jsonData && jsonData.data && jsonData.data.token) {
                    // Establecer el valor como variable de entorno
                    bru.setEnvVar("TokenAccess", jsonData.data.token);
                    console.log("Token establecido correctamente");
                } else {
                    console.log("No se pudo encontrar el 'token' en la respuesta.");
                }
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: register
          type: http
          seq: 1
        http:
          method: POST
          url: http://localhost:3000/api/v1/auth/register
          body:
            type: json
            data: |-
              {
                  "name": "Juliana",
                  "email": "juliana@test.com",
                  "password": "123456",
                  "goal": "lose weight"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: food
      type: folder
      seq: 2
    request:
      auth: inherit
    items:
      - info:
          name: create custom food
          type: http
          seq: 2
        http:
          method: POST
          url: http://localhost:3000/api/v1/food
          body:
            type: json
            data: |
              {
                "name": "Banana",
                "caloriesPerUnit": 89,
                "baseUnit": "unidad"
              }
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: desactivateFood
          type: http
          seq: 4
        http:
          method: DELETE
          url: http://localhost:3000/api/v1/food/:id
          params:
            - name: id
              value: '1'
              type: path
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: getAllFoods
          type: http
          seq: 1
        http:
          method: GET
          url: http://localhost:3000/api/v1/food
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: 'Update food '
          type: http
          seq: 3
        http:
          method: PUT
          url: http://localhost:3000/api/v1/food/17
          body:
            type: json
            data: |-
              {
                "caloriesPerUnit": 95
              }
          auth:
            type: bearer
            token: '{{TokenAccess}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
